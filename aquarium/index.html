<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PulseChain Oceanomics | Ching Ching</title>
<meta name="description" content="The PulseChain market as a living aquarium: today's top gainers and losers swim as fish, sized by how hard they moved. From the Ching Ching app.">
<meta property="og:title" content="PulseChain Oceanomics">
<meta property="og:description" content="Today's top PulseChain movers, as fish. Big fish moved hard. Sharks are the cores.">
<link rel="icon" type="image/svg+xml" href="/arcade/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/arcade/favicon-32.png">
<link rel="apple-touch-icon" href="/arcade/apple-touch-icon.png">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; overscroll-behavior:none; }
body {
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
  /* the app's gradient: deep blue up top, paling toward the sand */
  background:linear-gradient(to bottom, #10508C 0%, #2472B4 45%, #5FA8D0 80%, #8FC6DE 100%);
  color:#F0F6FA; -webkit-font-smoothing:antialiased;
  user-select:none; -webkit-user-select:none;
}
#tank { position:fixed; inset:0; overflow:hidden; }
#ripples { position:absolute; top:0; left:0; width:100%; height:300px; pointer-events:none; }
#floor { position:absolute; bottom:0; left:0; width:100%; pointer-events:none; }

/* ---------- header bar: title, sliders side by side, actions ---------- */
#hud {
  position:fixed; top:0; left:0; right:0; z-index:40;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:calc(8px + env(safe-area-inset-top)) 12px 10px;
  background:linear-gradient(to bottom, rgba(7,34,62,0.82), rgba(7,34,62,0.5) 75%, rgba(7,34,62,0));
  pointer-events:none;
}
#title { pointer-events:auto; }
#title h1 { font-size:20px; font-weight:900; letter-spacing:0.01em; text-shadow:0 1px 3px rgba(6,38,66,0.6); }
#title h1 .accent { color:#FFD166; }
#title .sub { font-size:11px; font-weight:600; color:rgba(240,246,250,0.75); margin-top:2px; text-shadow:0 1px 2px rgba(6,38,66,0.5); }
#controls {
  display:flex; gap:6px; align-items:center; flex-wrap:wrap;
  margin-left:auto; pointer-events:auto;
}
.sliderGroup {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:5px 9px 6px; border-radius:10px;
  background:rgba(10,52,90,0.45); border:1px solid rgba(255,255,255,0.35);
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
}
.sliderGroup label {
  display:flex; justify-content:space-between; align-items:center; width:100%;
  height:16px; font-size:15px; color:rgba(240,246,250,0.9); white-space:nowrap; line-height:1;
}
.sliderGroup label .mid { font-size:11px; opacity:0.5; }
.sliderGroup label .end { font-size:10px; font-weight:800; letter-spacing:0.03em; color:rgba(240,246,250,0.75); }
#periodLabel { font-size:11px; font-weight:900; letter-spacing:0.06em; color:#FFD166; opacity:1; }
.sliderGroup input { width:108px; accent-color:#FFD166; }
.iconbtn {
  width:34px; height:34px; border:1px solid rgba(255,255,255,0.35); border-radius:10px;
  background:rgba(10,52,90,0.45); color:#F0F6FA; cursor:pointer; font-size:14px;
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
}
.iconbtn:active { transform:scale(0.94); }
.hidden { display:none !important; }

/* ---------- site menu ---------- */
#nav { position:relative; pointer-events:auto; align-self:flex-start; }
#navMenu {
  position:absolute; top:44px; left:0; min-width:160px; padding:6px;
  background:rgba(9,40,72,0.94); border:1px solid rgba(255,255,255,0.3); border-radius:12px;
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  box-shadow:0 12px 32px rgba(0,0,0,0.4);
}
#navMenu a { display:block; padding:9px 12px; border-radius:8px; color:#F0F6FA; text-decoration:none; font-weight:800; font-size:13px; }
#navMenu a:hover { background:rgba(255,255,255,0.12); }
#navMenu a.here { color:#FFD166; }
#status {
  position:fixed; left:50%; top:45%; transform:translate(-50%,-50%); z-index:30;
  font-weight:800; font-size:14px; letter-spacing:0.08em; color:rgba(240,246,250,0.9);
  background:rgba(10,52,90,0.5); padding:10px 18px; border-radius:12px;
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  text-align:center; line-height:1.6;
}
#foot {
  position:fixed; left:0; right:0; bottom:calc(6px + env(safe-area-inset-bottom));
  text-align:center; font-size:10.5px; font-weight:700; z-index:40;
  color:rgba(240,246,250,0.7); text-shadow:0 1px 2px rgba(6,38,66,0.5);
  pointer-events:none;
}
#foot a { color:#FFD166; text-decoration:none; pointer-events:auto; }

/* ---------- fish ---------- */
.fish {
  position:absolute; left:0; top:0; will-change:transform;
  display:flex; flex-direction:column; align-items:center;
  cursor:grab; touch-action:none; z-index:10;
}
.fish.dragging { cursor:grabbing; z-index:20; }
.fish svg { display:block; overflow:visible; }
.fish .bodywrap { position:relative; will-change:transform; }
.fish .logo {
  position:absolute; border-radius:50%; opacity:0.5; pointer-events:none;
  object-fit:cover;
}
.fish .tag {
  margin-top:-18px; display:flex; gap:5px; align-items:baseline;
  padding:2px 8px 3px; border-radius:999px;
  background:rgba(16,60,100,0.55);
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  pointer-events:none; white-space:nowrap;
}
.fish .sym { font-size:11px; font-weight:900; color:#fff; text-shadow:0 1px 1px rgba(0,0,0,0.8); }
.fish .chg { font-size:11px; font-weight:800; text-shadow:0 1px 1px rgba(0,0,0,0.8); }
.fish .chg.up { color:#5BE38A; }
.fish .chg.down { color:#FF7A7A; }
.fish .chg.flat { color:#C9CEE8; }
/* drag wiggle is JS-driven (burst thrashing, see tickFish) */

/* ---------- bubbles ---------- */
.bubble {
  position:absolute; border-radius:50%; pointer-events:none; z-index:5;
  background:radial-gradient(circle at 32% 30%, rgba(255,255,255,0.55), rgba(255,255,255,0.10) 60%, rgba(255,255,255,0.02));
  border:1px solid rgba(255,255,255,0.35);
  transition:transform linear; will-change:transform;
}

/* ---------- crabs and the turtle ---------- */
#crab { position:absolute; bottom:8px; left:0; z-index:12; pointer-events:none; will-change:transform; }
#sommi { position:absolute; bottom:6px; left:0; z-index:13; pointer-events:none; will-change:transform; }
#turtle { position:absolute; top:0; left:0; z-index:4; opacity:0.75; pointer-events:none; will-change:transform; }
@media (prefers-reduced-motion: no-preference){
  @keyframes legswing { from { rotate:-14deg; } to { rotate:14deg; } }
  #crab.walking .leg { animation:legswing 0.16s linear infinite alternate; transform-box:fill-box; }
  #crab.walking .leg:nth-child(odd) { animation-delay:-0.08s; }
  #crab.walking .leg:nth-child(1), #crab.walking .leg:nth-child(2) { transform-origin:100% 0; }
  #crab.walking .leg:nth-child(3), #crab.walking .leg:nth-child(4) { transform-origin:0 0; }
  @keyframes crabbob { from { translate:0 0; } to { translate:0 -2px; } }
  #crab.walking svg { animation:crabbob 0.32s ease-in-out infinite alternate; }
  @keyframes waddle { from { rotate:-5deg; } to { rotate:5deg; } }
  #sommi.dashing { animation:waddle 0.12s linear infinite alternate; }
  @keyframes paddle { from { rotate:-12deg; } to { rotate:12deg; } }
  #turtle .fl { animation:paddle 1.8s ease-in-out infinite alternate; transform-box:fill-box; transform-origin:top center; }
  #turtle .fl2 { animation-delay:-0.9s; }
  @keyframes turtlebob { from { translate:0 0; } to { translate:0 -7px; } }
  #turtle svg { animation:turtlebob 4s ease-in-out infinite alternate; }
}
</style>
</head>

<script>
'use strict';
/* =====================================================================
   PULSECHAIN OCEANOMICS — the app's Aquarium view, rebuilt for the web.
   Top 10 gainers + top 10 losers (24h) swim as paper fish. Fish size
   follows the app's formula, colors follow its gain buckets, the majors
   are sharks, and the token logo is blended onto every body.
   Single file, vanilla JS. Part of Ching Ching (chingching.xyz).
   ===================================================================== */

const SUBGRAPH = 'https://graph.pulsechain.com/subgraphs/name/pulsechain/pulsexv2';
const DEX_BATCH = 'https://api.dexscreener.com/tokens/v1/pulsechain/';
const LOGO = a => `https://dd.dexscreener.com/ds-data/tokens/pulsechain/${a}.png`;
// The app's remaining icon sources, in its order (getTokenIcon.swift):
// LibertySwap tokenlist, then PLS369's GitHub assets (paths are checksummed,
// so the repo tree doubles as the lowercase -> checksummed map).
const LIBERTY_LIST = 'https://raw.githubusercontent.com/LibertySwap-Finance/app-tokens/main/libertyx-tokenlist.json';
const PLS369_TREE = 'https://api.github.com/repos/PLS369/pulsechain-assets/git/trees/main?recursive=1';
const PLS369_LOGO = checksummed => `https://raw.githubusercontent.com/PLS369/pulsechain-assets/main/blockchain/pulsechain/assets/${checksummed}/logo.png`;

let libertyMapP = null;
function libertyMap(){
  return libertyMapP ??= fetch(LIBERTY_LIST).then(r=>r.json()).then(j=>{
    const m = {};
    for (const t of j.tokens || []){
      if (t.address && t.logoURI) m[t.address.toLowerCase()] = t.logoURI;
    }
    return m;
  }).catch(()=> ({}));
}
let pls369MapP = null;
function pls369Map(){
  return pls369MapP ??= fetch(PLS369_TREE).then(r=>r.json()).then(j=>{
    const m = {};
    for (const e of j.tree || []){
      const hit = /^blockchain\/pulsechain\/assets\/(0x[0-9a-fA-F]{40})\/logo\.png$/.exec(e.path || '');
      if (hit) m[hit[1].toLowerCase()] = hit[1];
    }
    return m;
  }).catch(()=> ({}));
}
// Candidate URL for each stage of the app's fallback chain; null skips ahead.
async function logoSrc(t, stage){
  switch (stage){
    case 0: return LOGO(t.addr);                  // DexScreener token image
    case 1: return t.infoLogo || null;            // the pair's claimed info.imageUrl
    case 2: { const m = await libertyMap(); return m[t.addr] || null; }
    case 3: { const m = await pls369Map(); const c = m[t.addr]; return c ? PLS369_LOGO(c) : null; }
    default: return null;
  }
}
function attachLogoChain(img, t){
  let stage = 0;
  const tryStage = async ()=>{
    while (stage <= 3){
      const src = await logoSrc(t, stage);
      stage++;
      if (src){ img.src = src; return; }
    }
    img.remove();
  };
  img.onerror = tryStage;
  tryStage();
}

let FISH_LIMIT = 20;                   // 10 gainers + 10 losers by default; the slider tunes it

const BAKED = [

const tank = document.getElementById('tank');

// One path for every size change (resize event, or an embed that settles its

function handleResize(){
  if (innerWidth === W && innerHeight === H) return;
  W = innerWidth; H = innerHeight;
  sizeRipples();
  for (const f of fishes){
    f.x = rand(f.w/2, Math.max(f.w, W - f.w/2));
    f.y = rand(H*0.14, H*0.86);
    newLeg(f, true);
  }
}

/* =====================================================================
   DATA — token universe from the PulseX subgraph, live numbers from
   DexScreener (same batched endpoint the app and web viewer use).
   ===================================================================== */
async function fetchUniverse(){
  try {
    const r = await fetch(SUBGRAPH, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ query:'{ tokens(first: 160, orderBy: tradeVolumeUSD, orderDirection: desc) { id } }' }),
    });
    const j = await r.json();
    const ids = (j.data && j.data.tokens || []).map(t => t.id.toLowerCase());
    if (ids.length > 20) return ids;
  } catch(e){}
  return BAKED;
}

async function fetchDexData(addrs){
  const best = new Map();   // token address -> best pair
  for (let i=0; i<addrs.length; i+=30){
    const chunk = addrs.slice(i, i+30);
    try {
      const r = await fetch(DEX_BATCH + chunk.join(','));
      const pairs = await r.json();
      if (!Array.isArray(pairs)) continue;
      for (const p of pairs){
        if (!p || !p.baseToken || !p.priceUsd) continue;            // never keep a priceless pair
        const a = (p.baseToken.address || '').toLowerCase();
        if (!chunk.includes(a)) continue;
        const liq = p.liquidity && p.liquidity.usd || 0;
        const cur = best.get(a);
        if (!cur || liq > (cur.liquidity && cur.liquidity.usd || 0)) best.set(a, p);
      }
    } catch(e){}
  }
  return best;
}

// The change % for the current window: hour windows ride the pair data we
// already have; day windows come from PulseX day history (null = the token
// has no data that far back and sits this window out).
function pctOf(p, addr){
  if (PERIOD in DAY_PERIODS){
    const m = histCache[PERIOD];
    return m && m.has(addr) ? m.get(addr) : null;
  }
  const chg = p.priceChange || {};
  const v = +chg[PERIOD];
  return Number.isFinite(v) ? v : (PERIOD === 'h24' ? 0 : null);
}
async function ensurePeriodData(){
  if (!(PERIOD in DAY_PERIODS) || histCache[PERIOD] || !lastBest) return;
  const days = DAY_PERIODS[PERIOD];
  const target = (Math.floor(Date.now()/86400000) - days) * 86400;
  const ids = [...lastBest.keys()].map(a=>`"${a}"`).join(',');
  const query = `{tokenDayDatas(first:1000, orderBy:date, orderDirection:desc, where:{token_in:[${ids}], date_gte:${target - 3*86400}, date_lte:${target}}){token{id} date priceUSD}}`;
  const m = new Map();
  try {
    const r = await fetch(SUBGRAPH, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ query }) });
    const j = await r.json();
    const seen = new Set();
    for (const row of (j && j.data && j.data.tokenDayDatas || [])){
      const a = row.token.id.toLowerCase();
      if (seen.has(a)) continue;                     // desc order: first hit is closest to target
      seen.add(a);
      const old = parseFloat(row.priceUSD);
      const pair = lastBest.get(a);
      const cur = pair ? parseFloat(pair.priceUsd) : NaN;
      if (old > 0 && Number.isFinite(cur)) m.set(a, (cur - old)/old*100);
    }
  } catch(e){}
  histCache[PERIOD] = m;
}
function pickMovers(best){
  const seen = new Set();
  const clean = [];
  for (const [addr, p] of best){
    const sym = (p.baseToken.symbol || '').trim();
    const name = (p.baseToken.name || '').trim();
    const symLower = sym.toLowerCase(), nameLower = name.toLowerCase();
    const liq = p.liquidity && p.liquidity.usd || 0;
    if (!sym || liq < MIN_LIQUIDITY) continue;
    if (seen.has(symLower)) continue;
    if (SUSPICIOUS.some(k => symLower.includes(k) || nameLower.includes(k))) continue;
    seen.add(symLower);
    clean.push({
      addr,
      symbol: symLower === 'wpls' ? 'PLS' : sym,   // the app shows WPLS as PLS
      price: parseFloat(p.priceUsd) || 0,
      chg: pctOf(p, addr),                          // the selected window's move, null = no data
      liq,
      infoLogo: p.info && p.info.imageUrl || null,   // claimed pair artwork, free with the batch
    });
  }
  // The majors patrol the tank no matter what the market did today (the app
  // force-refreshes its key tokens for the same reason). Movers fill the rest,
  // and GAIN_BIAS skews the mix from all-losers through balanced to all-gainers.
  const sharks = clean.filter(t => SHARKS.has(t.addr));   // cores stay even with no history
  const rest = clean.filter(t => !SHARKS.has(t.addr) && t.chg != null).sort((a,b)=> b.chg - a.chg);
  const slots = Math.max(2, FISH_LIMIT - sharks.length);
  const gainCount = Math.round(slots * GAIN_BIAS);
  const loseCount = slots - gainCount;
  const picked = [...sharks], used = new Set(sharks.map(t=>t.addr));
  const pool = [...rest.slice(0, gainCount), ...(loseCount > 0 ? rest.slice(-loseCount) : [])];
  for (const t of pool){
    if (used.has(t.addr)) continue;
    used.add(t.addr); picked.push(t);
  }
  return picked;
}

const hashOf = addr => (parseInt(addr.slice(2, 10), 16) || 0) >>> 0;
function tokenLook(addr){
  const h = hashOf(addr);
  const [a, b] = PALETTE[h % PALETTE.length];
  const shape = (h >>> 4) % APP_FISH.length;
  const roll = (h >>> 7) % 4;                       // half plain, quarter each
  const pattern = roll === 2 ? 'stripes' : roll === 3 ? 'spots' : 'plain';
  return { a, b, shape, pattern };

// Dark translucent markings read on every base color; coordinates scale to
// each asset's own viewBox.
function patternOverlay(clipId, pattern, vw, vh, seed){
  let sd = (seed || 1) >>> 0;
  const rnd = ()=> ((sd = (sd*1664525 + 1013904223) >>> 0) / 4294967296);
  if (pattern === 'stripes'){
    // tiger-style bands: each stripe sways with its own bezier curve and
    // tapers toward the belly; the sway is seeded per token so a fish's
    // stripes are organic but identical every visit
    const bands = [0.16,0.34,0.52,0.68].map(fx=>{
      const cx = vw*fx + (rnd()-0.5)*vw*0.03;
      const wTop = vw*(0.06 + rnd()*0.03), wBot = wTop*(0.4 + rnd()*0.25);
      const s1 = (rnd()-0.5)*vw*0.18, s2 = (rnd()-0.5)*vw*0.18, s3 = (rnd()-0.5)*vw*0.10;
      const y0 = -vh*0.2, y3 = vh*1.2, y1 = vh*0.25, y2 = vh*0.7;
      const L = w2 => `C ${cx+s1-w2},${y1} ${cx+s2-w2},${y2} ${cx+s3-wBot/2},${y3}`;
      const R = w2 => `C ${cx+s2+w2},${y2} ${cx+s1+w2},${y1} ${cx+wTop/2},${y0}`;
      return `<path d="M ${cx-wTop/2},${y0} ${L(wTop/2)} L ${cx+s3+wBot/2},${y3} ${R(wTop/2)} Z"/>`;
    }).join('');
    return `<g clip-path="url(#${clipId})" fill="rgba(16,42,72,0.18)" transform="rotate(-8 ${vw/2} ${vh/2})">${bands}</g>`;
  }
  if (pattern === 'spots'){
    const pts = [[0.3,0.38],[0.5,0.6],[0.62,0.3],[0.42,0.22],[0.22,0.62],[0.68,0.55]];
    return `<g clip-path="url(#${clipId})" fill="rgba(16,42,72,0.16)">` +
      pts.map(([fx,fy],i)=>`<circle cx="${vw*fx}" cy="${vh*fy}" r="${vw*(0.045+(i%3)*0.012)}"/>`).join('') + `</g>`;
  }
  return '';
}

    const up = has && t.chg >= 0;
    const cls = has ? (up ? 'up' : 'down') : 'flat';
    tag.innerHTML = `<span class="sym"></span><span class="chg ${cls}">${has ? (up?'+':'')+t.chg.toFixed(1)+'%' : '&#8212;'}</span>`;
    tag.querySelector('.sym').textContent = t.symbol.slice(0, 8);
    el.appendChild(tag);
    tank.appendChild(el);

    const fish = {
      el, t, w, h,
      x: rand(w/2, W - w/2), y: rand(H*0.14, H*0.86),
      fx: 0, fy: 0, dur: 1, t0: 0, facing: 1, flip: 1, dragging: false, wig: 0,
    };
    newLeg(fish, true);
    attachDrag(fish);
    fishes.push(fish);
    enrichLook(fish);
  });
}

// pick the next swim target: anywhere across, small vertical drift (the app's rules)
function newLeg(fish, first){
  fish.fx = fish.x; fish.fy = fish.y;
  fish.tx = rand(fish.w/2, W - fish.w/2);
  fish.ty = clamp(fish.y + rand(-60, 60), H*0.12, H*0.86);
  // sharks ignore the speed slider: apex predators do not hurry
  fish.dur = rand(4, 8) * 1000 / (SHARKS.has(fish.t.addr) ? 1 : SPEED);
  fish.t0 = performance.now() + (first ? rand(-4000, 0) : 0);   // desync starts
  fish.facing = fish.tx > fish.x ? 1 : -1;
}
const easeInOut = p => p<0.5 ? 2*p*p : 1-((-2*p+2)**2)/2;

function tickFish(now){
  for (const f of fishes){
    if (f.dragging){
      // a held fish thrashes in bursts: a violent flap, a beat of stillness,
      // another flap, like something that would rather be swimming
      if (!REDUCED_MOTION){
        const tg = now/1000 - (f.grabAt || 0);
        // cos^2 so the first flap lands the instant it is grabbed (panic!),
        // then thrash-rest cycles for as long as it is held
        const burst = Math.pow(Math.cos(tg*2.4), 2);
        f.wig = 14 * burst * Math.sin(tg*19 + f.t0);
        render(f);
      }
      continue;
    }
    // released fish settle instead of snapping straight
    if (f.wig !== 0){
      f.wig *= 0.86;
      if (Math.abs(f.wig) < 0.3) f.wig = 0;
    }
    let p = (now - f.t0) / f.dur;
    if (p >= 1){ newLeg(f); p = 0; }
    const e = easeInOut(clamp(p, 0, 1));
    f.x = f.fx + (f.tx - f.fx)*e;
    f.y = f.fy + (f.ty - f.fy)*e + Math.sin(now/900 + f.t0)*3;   // gentle bob
    f.flip += (f.facing - f.flip)*0.08;                           // smooth turn
    render(f);
  }
}
function render(f){
  const rot = f.wig ? ` rotate(${f.wig.toFixed(2)}deg)` : '';
  f.el.style.transform = `translate(${(f.x - f.w/2).toFixed(1)}px, ${(f.y - f.h/2).toFixed(1)}px)`+rot;
  f.el.querySelector('.bodywrap').style.transform = `scaleX(${f.flip.toFixed(3)})`;
}

function attachDrag(fish){
  fish.el.addEventListener('pointerdown', e => {
    e.preventDefault();
    fish.dragging = true;
    fish.grabAt = performance.now()/1000;
    fish.el.classList.add('dragging');
    fish.el.setPointerCapture(e.pointerId);
    const move = ev => {
      fish.x = ev.clientX; fish.y = ev.clientY;
      render(fish);
    };
    const upEv = () => {
      fish.dragging = false;
      fish.el.classList.remove('dragging');
      newLeg(fish);
      fish.el.removeEventListener('pointermove', move);
      fish.el.removeEventListener('pointerup', upEv);
      fish.el.removeEventListener('pointercancel', upEv);
    };
    fish.el.addEventListener('pointermove', move);
    fish.el.addEventListener('pointerup', upEv);
    fish.el.addEventListener('pointercancel', upEv);
  });
}

async function corsBitmap(url){
  try {
    const ctl = new AbortController(); const to = setTimeout(()=>ctl.abort(), 4000);
    const r = await fetch(url, { mode:'cors', signal: ctl.signal });
    clearTimeout(to);
    if (!r.ok) return null;
    return await createImageBitmap(await r.blob());
  } catch(e){ return null; }
}
async function snapshotLogo(f){
  const el2 = f.el.querySelector('.logo');
  const cands = [];
  if (el2 && el2.src) cands.push(el2.src);
  const lm = await libertyMap(); if (lm[f.t.addr]) cands.push(lm[f.t.addr]);
  const pm = await pls369Map(); if (pm[f.t.addr]) cands.push(PLS369_LOGO(pm[f.t.addr]));
  const tried = new Set();
  for (const u of cands){
    if (tried.has(u)) continue; tried.add(u);
    const bmp = await corsBitmap(u);
    if (bmp) return bmp;
  }
  return null;
}
/* =====================================================================
   LOGO-DRIVEN LOOKS — the token's logo dictates its fish's colors and
   pattern: dominant hue becomes the body, a pale mix of it the belly,
   and the number of distinct hues picks plain, stripes, or spots.
   Sampling needs CORS (the same chain the snapshot uses); tokens whose
   logos cannot be read keep their address-hash look. Successful looks
   persist so identities stay stable across visits.
   ===================================================================== */
let logoLookCache = new Map();
try { logoLookCache = new Map(JSON.parse(localStorage.getItem('oceanomics_looks') || '[]')); } catch(e){}
let looksSaveT = null;
function saveLooks(){
  clearTimeout(looksSaveT);
  looksSaveT = setTimeout(()=>{
    try { localStorage.setItem('oceanomics_looks', JSON.stringify([...logoLookCache].slice(-400))); } catch(e){}
  }, 800);
}
function analyzeLogo(bmp){
  try {
    const c = document.createElement('canvas'); c.width = c.height = 24;
    const x = c.getContext('2d', { willReadFrequently: true });
    x.drawImage(bmp, 0, 0, 24, 24);
    const d = x.getImageData(0, 0, 24, 24).data;
    const bins = new Map();   // 30-degree hue bin -> [count, rSum, gSum, bSum]
    let total = 0;
    for (let i = 0; i < d.length; i += 4){
      const r = d[i], g = d[i+1], b = d[i+2], a = d[i+3];
      if (a < 128) continue;
      const mx = Math.max(r,g,b)/255, mn = Math.min(r,g,b)/255;
      const l = (mx+mn)/2, sat = mx === mn ? 0 : (mx-mn)/(1-Math.abs(2*l-1));
      if (l < 0.12 || l > 0.94 || sat < 0.18) continue;   // skip blacks, whites, greys
      let h;
      const rf = r/255, gf = g/255, bf = b/255;
      if (mx === rf) h = ((gf-bf)/(mx-mn)) % 6;
      else if (mx === gf) h = (bf-rf)/(mx-mn) + 2;
      else h = (rf-gf)/(mx-mn) + 4;
      h = (h*60 + 360) % 360;
      const bin = Math.round(h/30) % 12;
      const e = bins.get(bin) || [0,0,0,0];
      e[0]++; e[1]+=r; e[2]+=g; e[3]+=b;
      bins.set(bin, e);
      total++;
    }
    if (!total || total < 12) return null;               // logo is basically monochrome art
    const ranked = [...bins.values()].sort((p,q)=> q[0]-p[0]);
    const [n, rS, gS, bS] = ranked[0];
    // normalize the dominant color into the tank's pleasant range:
    // keep the logo's hue but enforce paper-craft saturation and lightness
    const rAvg = rS/n, gAvg = gS/n, bAvg = bS/n;
    const mxA = Math.max(rAvg,gAvg,bAvg)/255, mnA = Math.min(rAvg,gAvg,bAvg)/255;
    let hA = 0;
    if (mxA !== mnA){
      const rf = rAvg/255, gf = gAvg/255, bf = bAvg/255;
      if (mxA === rf) hA = ((gf-bf)/(mxA-mnA)) % 6;
      else if (mxA === gf) hA = (bf-rf)/(mxA-mnA) + 2;
      else hA = (rf-gf)/(mxA-mnA) + 4;
      hA = (hA*60 + 360) % 360;
    }
    const lA0 = (mxA+mnA)/2;
    const sA0 = mxA === mnA ? 0 : (mxA-mnA)/(1-Math.abs(2*lA0-1));
    const sA = Math.max(sA0, 0.55);
    const lA = Math.min(0.62, Math.max(0.45, lA0));
    const body = `hsl(${Math.round(hA)},${Math.round(sA*100)}%,${Math.round(lA*100)}%)`;
    const belly = `hsl(${Math.round(hA)},${Math.round(sA*70)}%,${Math.round(Math.min(93, lA*100+32))}%)`;
    const hues = ranked.filter(e => e[0] >= total*0.08).length;
    const pattern = hues <= 1 ? 'plain' : hues === 2 ? 'stripes' : 'spots';
    return { a: body, b: belly, pattern };
  } catch(e){ return null; }
}
async function enrichLook(f2){
  if (SHARKS.has(f2.t.addr)) return;
  let look = logoLookCache.get(f2.t.addr);
  if (look === undefined){
    const bmp = f2._snapLogo || await snapshotLogo(f2);
    if (bmp) f2._snapLogo = bmp;
    look = bmp ? analyzeLogo(bmp) : null;
    logoLookCache.set(f2.t.addr, look);   // null is cached too: no re-fetch storms

    const hash = tokenLook(f2.t.addr);
    f2.t.look = { ...hash, a: look.a, b: look.b, pattern: look.pattern };  // shape stays hash-stable

    ns.setAttribute('height', svg.getAttribute('height'));
    svg.replaceWith(ns);
  }
}
function svgToImage(svgEl){
  return new Promise(res => {
    const img = new Image();

    img.onerror = ()=> res(null);

function roundRect(x2, rx, ry, rw, rh, rr){
  x2.beginPath();
  x2.moveTo(rx+rr, ry);
  x2.arcTo(rx+rw, ry, rx+rw, ry+rr, rr); x2.arcTo(rx+rw, ry+rh, rx+rw-rr, ry+rh, rr);
  x2.arcTo(rx, ry+rh, rx, ry+rh-rr, rr); x2.arcTo(rx, ry, rx+rr, ry, rr);
  x2.closePath();
}
async function renderSnapshot(){
  handleResize();                 // never frame a stale viewport
  const SC = 2;
  const c = document.createElement('canvas');
  c.width = W*SC; c.height = H*SC;
  const x = c.getContext('2d');
  x.scale(SC, SC);
  // water
  const grad = x.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#10508C'); grad.addColorStop(0.45,'#2472B4');
  grad.addColorStop(0.8,'#5FA8D0'); grad.addColorStop(1,'#8FC6DE');
  x.fillStyle = grad; x.fillRect(0,0,W,H);
  // surface ripples, same maths as the live ones
  const t = performance.now()/2000;
  for (let i=0;i<5;i++){
    x.strokeStyle = `rgba(220,235,245,${0.28 - i*0.045})`;
    x.lineWidth = 2;
    x.beginPath();
    const yBase = 40 + i*48, len = W/3;
    for (let px=0; px<=W; px+=6){
      const py = yBase + Math.sin(px/len*Math.PI*2 + t + i)*10;
      px ? x.lineTo(px,py) : x.moveTo(px,py);
    }
    x.stroke();
  }
  // the floor
  const floorImg = await svgToImage(document.getElementById('floor'));
  if (floorImg) x.drawImage(floorImg, 0, H-150, W, 150);
  // live bubbles, wherever they currently are
  for (const b of document.querySelectorAll('.bubble')){
    const r = b.getBoundingClientRect();
    if (r.bottom < 0 || r.top > H) continue;
    x.fillStyle='rgba(255,255,255,0.12)'; x.strokeStyle='rgba(255,255,255,0.35)';
    x.beginPath(); x.arc(r.left+r.width/2, r.top+r.height/2, r.width/2, 0, TAU);
    x.fill(); x.stroke();
  }
  // the school
  for (const f of fishes){
    const svgEl = f.el.querySelector('svg');
    const img = await svgToImage(svgEl);
    if (!img) continue;
    x.save(); x.translate(f.x, f.y); x.scale(f.flip < 0 ? -1 : 1, 1);
    x.drawImage(img, -f.w/2, -f.h/2, f.w, f.h);
    x.restore();
    if (f._snapLogo){
      // same geometry the live logo uses, derived from the fish itself so it
      // can never go stale against the drawn position
      const ld = fishSize(f.t.chg || 0) * SIZE_SCALE * 0.34;
      const lx = f.x, ly = f.y + f.h*0.02;
      x.save(); x.globalAlpha = 0.5;
      x.beginPath(); x.arc(lx, ly, ld/2, 0, TAU); x.clip();
      x.drawImage(f._snapLogo, lx-ld/2, ly-ld/2, ld, ld);
      x.restore();
    }
    // the label capsule
    const chgEl = f.el.querySelector('.chg');
    const sym = f.el.querySelector('.sym').textContent;
    const chg = chgEl.textContent;
    x.font = '800 11px -apple-system, "Helvetica Neue", sans-serif';
    const symW = x.measureText(sym).width, chgW = x.measureText(chg).width;
    const total = symW + 6 + chgW, capW = total + 18, capH = 19;
    const cx2 = f.x, cy2 = f.y + f.h/2 - 4;
    x.fillStyle = 'rgba(16,60,100,0.72)';
    roundRect(x, cx2-capW/2, cy2-capH/2, capW, capH, capH/2); x.fill();
    x.textBaseline = 'middle';
    x.fillStyle = '#fff'; x.fillText(sym, cx2-total/2, cy2+0.5);
    x.fillStyle = chgEl.classList.contains('up') ? '#5BE38A' : chgEl.classList.contains('down') ? '#FF7A7A' : '#C9CEE8';
    x.fillText(chg, cx2-total/2+symW+6, cy2+0.5);
  }
  // wordmark, so the PNG travels with its address
  x.textBaseline = 'alphabetic';
  x.font = '900 22px -apple-system, "Helvetica Neue", sans-serif';
  x.fillStyle = '#F0F6FA'; x.fillText('PulseChain', 16, 32);
  x.fillStyle = '#FFD166'; x.fillText('OCEANOMICS', 133, 32);
  x.font = '800 12px -apple-system, "Helvetica Neue", sans-serif';
  x.fillStyle = 'rgba(240,246,250,0.85)';
  x.fillText('chingching.xyz/aquarium', 16, 50);
  return c;
}
let snapping = false;
document.getElementById('snapBtn').addEventListener('click', async ()=>{
  if (snapping) return;
  snapping = true;
  statusEl.hidden = false; statusEl.textContent = 'Framing the tank…';
  try {
    await Promise.all(fishes.map(async f => { f._snapLogo = f._snapLogo || await snapshotLogo(f); }));
    const c = await renderSnapshot();
    const blob = await new Promise(res => c.toBlob(res, 'image/png'));
    if (!blob) throw new Error('no blob');
    statusEl.hidden = true;
    const file = new File([blob], 'oceanomics.png', { type:'image/png' });
    const text = 'The PulseChain market as a living aquarium. Big fish moved hard, sharks are the cores. 🦈\n\nhttps://chingching.xyz/aquarium/';
    if (navigator.canShare && navigator.canShare({ files:[file] })){
      try { await navigator.share({ files:[file], text }); snapping = false; return; }
      catch(e){ if (e.name === 'AbortError'){ snapping = false; return; } }
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'oceanomics.png'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text), '_blank');
  } catch(e){
    statusEl.textContent = 'Snapshot failed, try again';
    setTimeout(()=>{ statusEl.hidden = true; }, 1500);
  }
  snapping = false;
});

/* ---------- site menu ---------- */
const navBtn = document.getElementById('navBtn'), navMenu = document.getElementById('navMenu');
navBtn.addEventListener('click', e => {
  e.stopPropagation();
  const open = navMenu.classList.toggle('hidden') === false;
  navBtn.setAttribute('aria-expanded', open);
});
document.addEventListener('click', ()=>{ navMenu.classList.add('hidden'); navBtn.setAttribute('aria-expanded','false'); });
load();
