<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="pls" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF2E9A"/>
      <stop offset="0.5" stop-color="#9B5CFF"/>
      <stop offset="1" stop-color="#7FB0FF"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF7CC0"/>
      <stop offset="1" stop-color="#A9C6FF"/>
    </linearGradient>
  </defs>
  <!-- coin face -->
  <circle cx="32" cy="32" r="30" fill="url(#pls)"/>
  <!-- reeded edge ticks -->
  <g stroke="rgba(255,255,255,0.55)" stroke-width="2.4">
    <line x1="32" y1="2.5" x2="32" y2="7"/>
    <line x1="32" y1="57" x2="32" y2="61.5"/>
    <line x1="2.5" y1="32" x2="7" y2="32"/>
    <line x1="57" y1="32" x2="61.5" y2="32"/>
    <line x1="11.1" y1="11.1" x2="14.3" y2="14.3"/>
    <line x1="49.7" y1="49.7" x2="52.9" y2="52.9"/>
    <line x1="52.9" y1="11.1" x2="49.7" y2="14.3"/>
    <line x1="14.3" y1="49.7" x2="11.1" y2="52.9"/>
  </g>
  <!-- rim + inset ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#rim)" stroke-width="2.6"/>
  <circle cx="32" cy="32" r="24.5" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.6"/>
  <!-- denomination -->
  <text x="32" y="41.5" text-anchor="middle"
        font-family="-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-size="26" font-weight="900" fill="#FFFFFF"
        stroke="rgba(40,10,60,0.35)" stroke-width="1.2" paint-order="stroke">25&#162;</text>
</svg>
