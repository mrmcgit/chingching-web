<script src="https://cdn.jsdelivr.net/npm/js-sha3@0.9.3/src/sha3.min.js"></script>
<script>
// ---- Chain registry: everything the viewer needs per chain, from free CORS sources ----
const CHAINS = {
  pulsechain: {
    id: 'pulsechain', label: 'PLS', name: 'PulseChain', nativeSym: 'PLS',
    nativeSentinel: 'native_pls', color: '#FF2E9A', dexSlug: 'pulsechain',
    // Multiple endpoints — tried in order, falling through on failure.
    scans: ['https://api.scan.pulsechain.com', 'https://scan.pulsechain.box'],
    rpcs: ['https://rpc.pulsechain.com', 'https://rpc-pulsechain.g4mm4.io', 'https://pulsechain-rpc.publicnode.com'],
    wrapped: '0xa1077a294dde1b09bb078844df40758a5d0f9a27',
    // 7d/30d history only available for PulseChain (PulseX subgraph)
    subgraph: 'https://graph.pulsechain.com/subgraphs/name/pulsechain/pulsexv2',
    hexSubgraph: 'https://graph.pulsechain.com/subgraphs/name/Codeakk/Hex'
  },
  ethereum: {
    id: 'ethereum', label: 'ETH', name: 'Ethereum', nativeSym: 'ETH',
    nativeSentinel: 'native_eth', color: '#7FB0FF', dexSlug: 'ethereum',
    scans: ['https://eth.blockscout.com'],
    rpcs: ['https://ethereum-rpc.publicnode.com', 'https://eth.drpc.org', 'https://cloudflare-eth.com'],
    wrapped: '0xc02aaa39b223fe8d0a0e5c4f27ead9083c756cc2',
    subgraph: null
  }
};
const CHAIN_ORDER = ['pulsechain', 'ethereum'];
const PNS_REGISTRY = '0xbd5133993FCDED5945c5539D9f032261F0d13170'; // PulseChain Name Service
const ENS_REGISTRY = '0x00000000000C2E074eC69A0dFb2997BA6C7d2e1e'; // Ethereum Name Service
const APP_STORE_URL = 'https://apps.apple.com/app/ching-ching/id1622965914';
const SUSPICIOUS = ['claim', '.com', '.io', '.site', '.net', '.org', '.nf', 't.me', '.gd', '.page'];
const ALLOC_COLORS = ['#3987e5','#199e70','#c98500','#008300','#9085e9','#e66767','#d55181','#d95926'];
const ALLOC_OTHER = '#6E7794';
const HISTORY_TOKEN_CAP = 12;
const TOP_N = 5; // rows shown before "show all"
const DUST_USD = 1;      // hide any holding/position worth less than $1
const MIN_LIQ_USD = 100; // hide tokens whose DEX liquidity is under $100

function hexToBytes(hex) { const b = new Uint8Array(hex.length/2); for (let i=0;i<hex.length;i+=2) b[i/2]=parseInt(hex.substr(i,2),16); return b; }
function namehash(name) {
  let node = '0'.repeat(64);
  if (!name) return node;
  const labels = name.split('.');
  for (let i = labels.length-1; i>=0; i--) node = keccak_256(hexToBytes(node + keccak_256(labels[i])));
  return node;
}
// eth_call across the chain's RPCs, falling through to the next on any failure.
async function rpcCall(chain, to, data) {
  for (const rpc of CHAINS[chain].rpcs) {
    try {
      const res = await fetch(rpc, { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ jsonrpc:'2.0', method:'eth_call', params:[{to,data},'latest'], id:1 }) });
      if (res.ok) { const j = await res.json(); if (j.result !== undefined && !j.error) return j.result; }
    } catch(e) {}
  }

}
// GET a blockscout path (e.g. '/api/?module=…' or '/api/v2/tokens/0x…') across the
// chain's scan bases, falling through to the next on failure.
async function scanGet(chain, path) {
  for (const base of CHAINS[chain].scans) {
    try { const res = await fetch(base + path); if (res.ok) return await res.json(); } catch(e) {}
  }
  return null;
}
/// Resolve a .pls (PNS) or .eth (ENS) name to an address on its chain.
async function resolveName(name) {
  const isEth = name.endsWith('.eth');
  const chain = isEth ? 'ethereum' : 'pulsechain';
  const registry = isEth ? ENS_REGISTRY : PNS_REGISTRY;
  const node = namehash(name);
  const resolverRes = await rpcCall(chain, registry, '0x0178b8bf' + node); // resolver(bytes32)
  const resolver = '0x' + resolverRes.slice(26, 66);
  if (/^0x0+$/.test(resolver)) return null;
  const addrRes = await rpcCall(chain, resolver, '0x3b3b57de' + node); // addr(bytes32)
  const addr = '0x' + addrRes.slice(26, 66);
  return /^0x0+$/.test(addr) ? null : addr;
}

function formatUSD(n) {

  if (n>=1e6) return '$'+(n/1e6).toFixed(2)+'M'; if (n>=1000) return '$'+Math.round(n).toLocaleString('en-US');
  if (n>=1) return '$'+n.toFixed(2); if (n>=0.01) return '$'+n.toFixed(3); return '$'+n.toFixed(6);
}

  if (n<=0) return '-'; const exp=Math.floor(Math.log10(n)); return '$'+n.toFixed(Math.min(18,-exp+3));

async function fetchTokenList(chain, address) {

async function fetchPrices(chain, addresses) {
  if (!addresses.length) return {};
  const slug = CHAINS[chain].dexSlug, prices = {};
  for (let i=0;i<addresses.length;i+=30) {
    const batch = addresses.slice(i, i+30);
    try {
      const pairs = await (await fetch(`https://api.dexscreener.com/tokens/v1/${slug}/` + batch.join(','))).json();
      if (!Array.isArray(pairs)) continue;
      for (const p of pairs) {
        const addr = (p.baseToken?.address || '').toLowerCase();
        if (!addr) continue;
        const price = parseFloat(p.priceUsd) || 0;
        if (price <= 0) continue;
        const liq = p.liquidity?.usd || 0;
        if (prices[addr] && liq <= (prices[addr].liquidity || 0)) continue;
        prices[addr] = { price, h1:parseFloat(p.priceChange?.h1)||0, h6:parseFloat(p.priceChange?.h6)||0,
          h24:parseFloat(p.priceChange?.h24)||0, liquidity:liq, marketCap:p.marketCap||p.fdv||0,
          volume:p.volume?.h24||0, pairAddress:p.pairAddress||'', symbol:p.baseToken?.symbol||'?', name:p.baseToken?.name||'' };
      }
    } catch(e) {}
  }
  return prices;
}
/// PulseChain-only daily price history (PulseX v2 subgraph). Returns { byToken, changes }.
async function fetchHistorical(addresses) {
  const out = { byToken:{}, changes:{} };
  if (!addresses.length) return out;
  const now = Math.floor(Date.now()/1000), d30ago = now - 30*86400;
  const list = addresses.map(a=>`"${a.toLowerCase()}"`).join(',');
  const query = `{tokenDayDatas(first:1000, orderBy:date, orderDirection:desc, where:{token_in:[${list}], date_gte:${d30ago}}){token{id} date priceUSD}}`;
  try {
    const j = await (await fetch(CHAINS.pulsechain.subgraph, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query}) })).json();
    for (const r of (j?.data?.tokenDayDatas || [])) {
      const a = r.token.id.toLowerCase();
      (out.byToken[a] = out.byToken[a] || []).push({ date:parseInt(r.date), price:parseFloat(r.priceUSD) });
    }
    const d7t = now - 7*86400;
    for (const [a, days] of Object.entries(out.byToken)) {
      if (days.length < 2) continue; const newest = days[0].price; if (newest<=0) continue;
      const d7 = days.reduce((b,d)=>Math.abs(d.date-d7t)<Math.abs(b.date-d7t)?d:b), d30 = days[days.length-1];
      out.changes[a] = { d7: d7.price>0?((newest-d7.price)/d7.price)*100:0, d30: d30.price>0?((newest-d30.price)/d30.price)*100:0 };
    }
  } catch(e) { console.error('history fetch failed', e); }
  return out;
}

function tokensForFilter() {
  return currentTokens.filter(t => enabledChains.has(t.chain)).slice().sort((a,b) => b.value - a.value);
}

function chainCount(chain) { return currentTokens.filter(t => t.chain === chain).length; }

function hexChangeFor(chain, period) {
  if (period === 'h24') return hexMeta[chain]?.h24 || 0;
  if (chain === 'pulsechain') { // d7/d30 from HEX token history when available, else flat
    const days = currentHistory[HEX_ADDR];
    if (days && days.length >= 2 && days[0].price > 0) {
      const now = days[0].price, t = Math.floor(Date.now()/1000) - (period === 'd7' ? 7 : 30) * 86400;
      const row = days.reduce((b, d) => Math.abs(d.date - t) < Math.abs(b.date - t) ? d : b);
      if (row.price > 0) return ((now - row.price) / row.price) * 100;
    }
  }
  return 0;
}
// Whole-portfolio value = tokens + HEX stakes + LP (for the enabled chains). Stakes track
// HEX's change over the period; LP is treated as flat (no per-period underlying data).
function portfolioValue() {
  const tokens = tokensForFilter();
  const stakes = (currentStakes || []).filter(s => enabledChains.has(s.chain));
  const lp = (currentLP || []).filter(p => enabledChains.has(p.chain));
  const tokenVal = tokens.reduce((s, t) => s + t.value, 0);
  const stakeVal = stakes.reduce((s, x) => s + x.value, 0);
  const lpVal = lp.reduce((s, x) => s + x.value, 0);
  return { tokens, stakes, lp, tokenVal, stakeVal, lpVal, total: tokenVal + stakeVal + lpVal };
}
function grandTotal() { return portfolioValue().total; }
function portfolioChange(period) {
  const p = portfolioValue();
  let prev = 0;
  for (const t of p.tokens) { const h = t[period]; prev += (h == null) ? t.value : t.value / (1 + h / 100); }
  for (const s of p.stakes) { const h = hexChangeFor(s.chain, period); prev += s.value / (1 + h / 100); }
  for (const lp of p.lp) { const h = period === 'h24' ? (lp.h24 || 0) : 0; prev += lp.value / (1 + h / 100); } // LP uses 24h, flat for 7d/30d
  const abs = p.total - prev;
  return { abs, pct: prev > 0 ? (abs / prev) * 100 : 0 };
}

// Squarified treemap (Bruls et al.) — keeps cell aspect ratios close to square so labels read.
function squarify(items, x, y, w, h) {
  const total = items.reduce((s, i) => s + i.value, 0);
  if (total <= 0) return [];
  const scaled = items.map(i => ({ ...i, area: i.value / total * w * h }));
  const out = [], rect = { x, y, w, h };
  const worst = (row, side) => { const sum = row.reduce((s, r) => s + r.area, 0), mx = Math.max(...row.map(r => r.area)), mn = Math.min(...row.map(r => r.area)), s2 = sum * sum, d2 = side * side; return Math.max(d2 * mx / s2, s2 / (d2 * mn)); };
  const layout = (row) => {
    const sum = row.reduce((s, r) => s + r.area, 0);
    if (rect.w >= rect.h) { const rw = sum / rect.h; let cy = rect.y; for (const r of row) { const rh = r.area / rw; out.push({ ...r, x: rect.x, y: cy, w: rw, h: rh }); cy += rh; } rect.x += rw; rect.w -= rw; }
    else { const rh = sum / rect.w; let cx = rect.x; for (const r of row) { const rw = r.area / rh; out.push({ ...r, x: cx, y: rect.y, w: rw, h: rh }); cx += rw; } rect.y += rh; rect.h -= rh; }
  };
  const rem = scaled.slice(); let row = [];
  while (rem.length) { const it = rem[0], side = Math.min(rect.w, rect.h); if (!row.length || worst(row, side) >= worst([...row, it], side)) { row.push(it); rem.shift(); } else { layout(row); row = []; } }
  if (row.length) layout(row);
  return out;
}
function renderTreemap(segs, total) {
  const W = 320, H = 150;
  const rects = squarify(segs, 0, 0, W, H);

  const svg=document.getElementById('sparkSvg'), cross=document.getElementById('sparkCross'), dot=document.getElementById('sparkDot'), tip=document.getElementById('sparkTip');

    const r=svg.getBoundingClientRect(); let idx=Math.round((e.clientX-r.left)/r.width*(pts.length-1)); idx=Math.max(0,Math.min(pts.length-1,idx));
    const p=pts[idx]; cross.setAttribute('x1',p.x); cross.setAttribute('x2',p.x); cross.style.opacity=1;

function reconstructValueHistory(byToken) {
  const dates=[...new Set(Object.values(byToken).flat().map(d=>d.date))].sort((a,b)=>a-b);
  if (!dates.length) return { series:[], is30dHigh:false };
  const plsTokens = currentTokens.filter(t=>t.chain==='pulsechain');
  const bal={}; let weight=0;
  for (const t of plsTokens) { const newest=byToken[t.address]?.[0]?.price; if (!newest||newest<=0) continue; bal[t.address]=t.value/newest; weight+=t.value; }
  if (weight<=0) return { series:[], is30dHigh:false };
  const priceOn={}; for (const [a,days] of Object.entries(byToken)) { priceOn[a]={}; for (const d of days) priceOn[a][d.date]=d.price; }
  const series=[]; let maxVal=0;
  for (const date of dates) {
    let dayTotal=0, present=0;
    for (const t of plsTokens) { if (bal[t.address]===undefined) continue; const p=priceOn[t.address]?.[date]; if (p===undefined) continue; dayTotal+=bal[t.address]*p; present+=t.value; }
    if (present/weight < 0.6) continue; series.push({date, value:dayTotal}); if (dayTotal>maxVal) maxVal=dayTotal;
  }
  const plsTotal = plsTokens.reduce((s,t)=>s+t.value,0);
  return { series, is30dHigh: series.length>3 && plsTotal>=maxVal*0.99 };
}

/// Fetch one chain's tokens+native and return tagged token objects.
async function loadChain(chain, address) {
  const cfg = CHAINS[chain], out = [];
  const [erc20, nativeWei] = await Promise.all([ fetchTokenList(chain, address), fetchNativeBalance(chain, address) ]);
  rawTokenLists[chain] = erc20; // keep the full list (LP tokens are filtered out of the token view but needed for LP)
  const addrs = erc20.map(t=>t.contractAddress.toLowerCase()); addrs.push(cfg.wrapped);
  const prices = await fetchPrices(chain, [...new Set(addrs)]);
  const wrapped = prices[cfg.wrapped] || { price:0 };
  const nativeBal = parseFloat(nativeWei)/1e18;
  if (nativeBal>0 && wrapped.price>0) out.push({
    chain, key:chain+'/'+cfg.nativeSentinel, native:true, symbol:cfg.nativeSym, address:cfg.wrapped, contractAddress:cfg.wrapped,
    balance:nativeBal, value:nativeBal*wrapped.price, price:wrapped.price, liquidity:wrapped.liquidity||0, marketCap:0,
    volume:wrapped.volume||0, pairAddress:wrapped.pairAddress||'', name:cfg.name, h1:wrapped.h1||0, h6:wrapped.h6||0, h24:wrapped.h24||0, d7:null, d30:null });
  for (const t of erc20) {
    const a = t.contractAddress.toLowerCase(), p = prices[a];
    if (!p || p.price<=0 || isSuspicious(t.name,t.symbol) || p.liquidity < MIN_LIQ_USD) continue;
    const dec = parseInt(t.decimals)||18, bal = parseFloat(t.balance)/Math.pow(10,dec), value = bal*p.price;
    if (value < DUST_USD) continue;
    out.push({ chain, key:chain+'/'+a, native:false, symbol:p.symbol||t.symbol, address:a, contractAddress:t.contractAddress,
      balance:bal, value, price:p.price, liquidity:p.liquidity, marketCap:p.marketCap, volume:p.volume, pairAddress:p.pairAddress,
      name:p.name||t.name, h1:p.h1, h6:p.h6, h24:p.h24, d7:null, d30:null });
  }
  // Dedup within chain by symbol (keep larger)
  const by={}; for (const t of out) if (!by[t.symbol] || t.value>by[t.symbol].value) by[t.symbol]=t;
  return Object.values(by);
}

// ---------- HEX stakes ----------
const HEX_ADDR = '0x2b591e99afe9f32eaa6214f7b7629768c40eeb39';
const HEX_LAUNCH_TS = Date.UTC(2019, 11, 3) / 1000; // HEX day 1 ~ 2019-12-03 UTC
function hexDay() { return Math.floor((Date.now()/1000 - HEX_LAUNCH_TS) / 86400); }
function hexDayToDate(d) { return new Date((HEX_LAUNCH_TS + d*86400) * 1000); }
async function hexPriceFor(chain) {
  try {
    const arr = await (await fetch(`https://api.dexscreener.com/tokens/v1/${CHAINS[chain].dexSlug}/${HEX_ADDR}`)).json();
    if (!Array.isArray(arr)) return { price: 0, h24: 0 };
    let best = { price: 0, h24: 0 }, bestLiq = -1;
    for (const p of arr) { const liq = p.liquidity?.usd || 0, pr = parseFloat(p.priceUsd) || 0; if (pr > 0 && liq > bestLiq) { best = { price: pr, h24: parseFloat(p.priceChange?.h24) || 0 }; bestLiq = liq; } }
    return best;
  } catch(e) { return { price: 0, h24: 0 }; }
}
/// Build a cumulative sum of daily payoutPerTshareHEX by HEX day (from the hexstats
/// worker) so stake yield = T-Shares × (cum[endOrToday] - cum[startDay]). Cached per chain.
async function loadHexPayouts(chain) {
  if (hexPayoutCumulative[chain]) return hexPayoutCumulative[chain];
  const url = chain === 'ethereum'
    ? 'https://hexstats.chingching.xyz/fulldataethereum'
    : 'https://hexstats.chingching.xyz/fulldatapulsechain';
  try {
    const arr = await (await fetch(url)).json();
    const list = Array.isArray(arr) ? arr : (arr.data || Object.values(arr).find(Array.isArray));
    const byDay = {}; let maxDay = 0;
    for (const d of list) { const day = d.currentDay | 0; byDay[day] = d.payoutPerTshareHEX || 0; if (day > maxDay) maxDay = day; }
    const cum = new Float64Array(maxDay + 2); let run = 0;
    for (let day = 1; day <= maxDay; day++) { run += byDay[day] || 0; cum[day] = run; }
    hexPayoutCumulative[chain] = cum;
    return cum;
  } catch(e) { console.error('hex payouts', chain, e); return null; }
}
function stakeYieldHex(chain, tShares, startDay, endDay) {
  const cum = hexPayoutCumulative[chain]; if (!cum) return 0;
  const maxDay = cum.length - 2, end = Math.min(hexDay(), endDay);
  const a = cum[Math.min(Math.max(startDay, 0), maxDay)] || 0;
  const b = cum[Math.min(Math.max(end, 0), maxDay)] || 0;
  return tShares * Math.max(0, b - a);
}
/// pHEX stakes from the Codeakk/Hex subgraph. Active = endDay not yet passed.
async function fetchPulseHexStakes(address) {
  const q = `{stakeStarts(where:{stakerAddr:"${address.toLowerCase()}"}, first:1000, orderBy:endDay, orderDirection:asc){stakedHearts stakeTShares startDay endDay}}`;
  try {
    const r = await (await fetch(CHAINS.pulsechain.hexSubgraph, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})})).json();
    const cur = hexDay();
    return (r.data?.stakeStarts || []).filter(s => parseInt(s.endDay) >= cur)
      .map(s => ({ chain:'pulsechain', principal: parseInt(s.stakedHearts)/1e8, tShares: parseFloat(s.stakeTShares), startDay: parseInt(s.startDay), endDay: parseInt(s.endDay) }));
  } catch(e) { console.error('pHEX stakes', e); return []; }
}
/// eHEX stakes via on-chain reads: stakeCount(addr) then stakeLists(addr,i) decoded.
async function fetchEthHexStakes(address) {
  try {
    const pad = '000000000000000000000000' + address.slice(2).toLowerCase();
    const cntRes = await rpcCall('ethereum', HEX_ADDR, '0x33060d90' + pad); // stakeCount(address)
    const cnt = cntRes ? parseInt(cntRes, 16) : 0;
    if (!cnt) return [];
    const cur = hexDay();
    const results = await Promise.all(Array.from({length: cnt}, (_, i) =>
      rpcCall('ethereum', HEX_ADDR, '0x2607443b' + pad + i.toString(16).padStart(64, '0')))); // stakeLists(address,uint256)
    const out = [];
    for (const res of results) {
      if (!res || res.length < 2 + 64*5) continue;
      const w = k => BigInt('0x' + res.slice(2 + k*64, 2 + (k+1)*64));
      // struct: [stakeId, stakedHearts, stakeShares, lockedDay, stakedDays, unlockedDay, isAutoStake]
      const endDay = Number(w(3)) + Number(w(4));
      if (endDay < cur) continue;
      out.push({ chain:'ethereum', principal: Number(w(1))/1e8, tShares: Number(w(2))/1e12, startDay: Number(w(3)), endDay });
    }
    return out;
  } catch(e) { console.error('eHEX stakes', e); return []; }
}

// ---------- LP positions (PulseX + 9mm V2) ----------
async function queryDexPairs(subgraph, addrs, dexLabel) {
  if (!addrs.length) return {};
  const inList = addrs.map(a => `"${a}"`).join(',');
  const q = `{pairs(where:{id_in:[${inList}]}){id reserve0 reserve1 totalSupply token0{id symbol} token1{id symbol}}}`;
  try {
    const r = await (await fetch(subgraph, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})})).json();
    const out = {};
    for (const p of (r.data?.pairs || [])) out[p.id.toLowerCase()] = {
      reserve0: parseFloat(p.reserve0)||0, reserve1: parseFloat(p.reserve1)||0, totalSupply: parseFloat(p.totalSupply)||0,
      t0: p.token0.id.toLowerCase(), t1: p.token1.id.toLowerCase(), pair: `${p.token0.symbol}/${p.token1.symbol}`, dex: dexLabel
    };
    return out;
  } catch(e) { console.error('LP pairs', dexLabel, e); return {}; }
}
async function fetchPulseLP() {
  const raw = rawTokenLists['pulsechain'] || [];
  if (!raw.length) return [];
  const addrs = raw.map(t => t.contractAddress.toLowerCase());
  const [px, nm] = await Promise.all([
    queryDexPairs(CHAINS.pulsechain.subgraph, addrs, 'PulseX'),
    queryDexPairs('https://info-api.9mm.pro/subgraphs/name/pulsechain/9mm', addrs, '9mm')
  ]);
  const pairMap = { ...px, ...nm };
  // Value each LP by its underlying reserves x REAL DexScreener prices (a token with no
  // real market / not indexed prices to 0), so scam pairs with a subgraph-inflated
  // reserveUSD fall out naturally — no sanity cap needed.
  const under = new Set();
  for (const pair of Object.values(pairMap)) { under.add(pair.t0); under.add(pair.t1); }
  const prices = await fetchPrices('pulsechain', [...under]);
  const priceOf = a => { const p = prices[a]; return (p && p.liquidity >= MIN_LIQ_USD) ? p.price : 0; };
  const h24Of = a => { const p = prices[a]; return (p && p.liquidity >= MIN_LIQ_USD) ? (p.h24 || 0) : 0; };
  const positions = [];
  for (const t of raw) {
    const a = t.contractAddress.toLowerCase(), pair = pairMap[a];
    if (!pair || !(pair.totalSupply > 0)) continue;
    const dec = parseInt(t.decimals) || 18, bal = parseFloat(t.balance) / Math.pow(10, dec);
    if (!(bal > 0)) continue;
    const share = bal / pair.totalSupply;
    const v0 = share * pair.reserve0 * priceOf(pair.t0), v1 = share * pair.reserve1 * priceOf(pair.t1);
    const value = v0 + v1;
    if (value < DUST_USD) continue;
    const h24 = value > 0 ? (v0 * h24Of(pair.t0) + v1 * h24Of(pair.t1)) / value : 0;
    positions.push({ chain: 'pulsechain', dex: pair.dex, pairName: pair.pair, value, h24, address: a });
  }
  return positions.sort((a, b) => b.value - a.value);
}

/// 9mm V3 concentrated positions: compute token amounts from liquidity + ticks
/// (Uniswap-V3 math), value by real DexScreener prices like the V2 path.
async function fetchPulse9mmV3(address) {
  const q = `{positions(where:{owner:"${address.toLowerCase()}", liquidity_gt:"0"}, first:100){liquidity tickLower tickUpper pool{tick sqrtPrice token0{id symbol decimals} token1{id symbol decimals}}}}`;
  try {
    const r = await (await fetch('https://info-api.9mm.pro/subgraphs/name/pulsechain/9mm-v3', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})})).json();
    const positions = r.data?.positions || [];
    if (!positions.length) return [];
    const under = new Set();
    for (const p of positions) { under.add(p.pool.token0.id); under.add(p.pool.token1.id); }
    const prices = await fetchPrices('pulsechain', [...under]);
    const priceOf = a => { const p = prices[a.toLowerCase()]; return (p && p.liquidity >= MIN_LIQ_USD) ? p.price : 0; };
    const h24Of = a => { const p = prices[a.toLowerCase()]; return (p && p.liquidity >= MIN_LIQ_USD) ? (p.h24 || 0) : 0; };
    const sq = t => Math.pow(1.0001, t / 2);
    const out = [];
    for (const p of positions) {
      const L = Number(p.liquidity), tick = Number(p.pool.tick), sqrtC = Number(p.pool.sqrtPrice) / 2 ** 96;
      const sqrtL = sq(p.tickLower), sqrtU = sq(p.tickUpper);
      let a0 = 0, a1 = 0;
      if (tick < p.tickLower) a0 = L * (1 / sqrtL - 1 / sqrtU);
      else if (tick >= p.tickUpper) a1 = L * (sqrtU - sqrtL);
      else { a0 = L * (1 / sqrtC - 1 / sqrtU); a1 = L * (sqrtC - sqrtL); }
      const amt0 = a0 / 10 ** p.pool.token0.decimals, amt1 = a1 / 10 ** p.pool.token1.decimals;
      const v0 = amt0 * priceOf(p.pool.token0.id), v1 = amt1 * priceOf(p.pool.token1.id);
      const value = v0 + v1;
      if (!isFinite(value) || value < DUST_USD) continue;
      const h24 = value > 0 ? (v0 * h24Of(p.pool.token0.id) + v1 * h24Of(p.pool.token1.id)) / value : 0;
      out.push({ chain: 'pulsechain', dex: '9mm V3', pairName: `${p.pool.token0.symbol}/${p.pool.token1.symbol}`, value, h24 });
    }
    return out;
  } catch(e) { console.error('9mm V3', e); return []; }
}

async function loadStakesAndLP(address) {
  const [pls, eth, pMeta, eMeta] = await Promise.all([
    fetchPulseHexStakes(address), fetchEthHexStakes(address), hexPriceFor('pulsechain'), hexPriceFor('ethereum')
  ]);
  hexMeta = { pulsechain: pMeta, ethereum: eMeta };
  // The daily-payout history is large (~4.6MB/chain), so only pull it for chains that
  // actually have stakes; it's cached across the session once fetched.
  await Promise.all([ pls.length && loadHexPayouts('pulsechain'), eth.length && loadHexPayouts('ethereum') ].filter(Boolean));
  const withValue = (s, price) => {
    const y = stakeYieldHex(s.chain, s.tShares, s.startDay, s.endDay);
    const totalHex = s.principal + y;
    return { ...s, yieldHex: y, totalHex, value: totalHex * price };
  };
  currentStakes = [ ...pls.map(s => withValue(s, pMeta.price)), ...eth.map(s => withValue(s, eMeta.price)) ].filter(s => s.value >= DUST_USD).sort((a, b) => b.value - a.value);
  renderBody();
  const [v2lp, v3lp] = await Promise.all([ fetchPulseLP(), fetchPulse9mmV3(address) ]);
  currentLP = [...v2lp, ...v3lp].sort((a, b) => b.value - a.value);
  renderBody();
}

  }
  const url = new URL(window.location); url.searchParams.set('wallet', address); if (displayName) url.searchParams.set('name', displayName); history.replaceState({},'',url);
  document.getElementById('walletTitle').textContent = displayName || shortAddr(address);
  document.getElementById('walletSubtitle').textContent = displayName ? shortAddr(address) : 'Portfolio';
  renderLoading();
  try {
    const perChain = await Promise.all(CHAIN_ORDER.map(c => loadChain(c, address).catch(e=>{ console.error(c,e); return []; })));
    currentTokens = perChain.flat();
    if (!currentTokens.reduce((s,t)=>s+t.value,0)) { renderError('No token holdings found for this wallet.'); return; }
    enabledChains = new Set(CHAIN_ORDER.filter(c => chainCount(c) > 0)); // every chain with holdings starts on
    showAllTokens = false; lastSparkline = null; currentStakes = null; currentLP = null;
    renderBody();
    loadStakesAndLP(address);
    // PulseChain history (7d/30d + value sparkline) in the background
    const plsAddrs = [...new Set(currentTokens.filter(t=>t.chain==='pulsechain').sort((a,b)=>b.value-a.value).slice(0,HISTORY_TOKEN_CAP).map(t=>t.address))];
    fetchHistorical(plsAddrs).then(hist=>{
      currentHistory = hist.byToken;
      for (const t of currentTokens) { const h = hist.changes[t.address]; if (h && t.chain==='pulsechain') { t.d7=h.d7; t.d30=h.d30; } }
      const { series, is30dHigh } = reconstructValueHistory(hist.byToken);
      if (enabledChains.has('pulsechain')) renderSparkline(series, is30dHigh);
      if (currentPeriod==='d7'||currentPeriod==='d30') setPeriod(currentPeriod);
    });
  } catch(e) { renderError('Failed to load wallet data.'); console.error(e); }
}

// ---- iOS "get the app" banner ----
function isIOS() {
  const ua = navigator.userAgent || '';
  return /iP(hone|ad|od)/.test(ua) || (navigator.platform === 'MacIntel' && (navigator.maxTouchPoints || 0) > 1);
}
function dismissBanner() {
  const b = document.getElementById('appBanner'); if (b) b.style.display = 'none';
  try { localStorage.setItem('ccBannerDismissed', '1'); } catch(e) {}
}
function maybeShowBanner() {
  let dismissed = false; try { dismissed = localStorage.getItem('ccBannerDismissed') === '1'; } catch(e) {}
  if (isIOS() && !dismissed) { const b = document.getElementById('appBanner'); if (b) b.style.display = 'flex'; }
}

// ---- change the viewed wallet without editing the URL ----
function toggleWalletInput() {
  const el = document.getElementById('walletInput');
  const show = el.style.display === 'none' || !el.style.display;
  el.style.display = show ? 'flex' : 'none';
  if (show) { const i = document.getElementById('changeAddr'); i.value = ''; i.focus(); }
}
function submitWallet() {
  const v = document.getElementById('changeAddr').value.trim();
  if (!v) return;
  document.getElementById('walletInput').style.display = 'none';
  const url = new URL(window.location); url.searchParams.delete('name'); history.replaceState({}, '', url);
  loadWallet(v);
}

// Close the sparkline popover when tapping elsewhere.
document.addEventListener('click', e => {
  if (!e.target.closest('.spark-note')) document.querySelectorAll('.spark-pop.show').forEach(p => { p.classList.remove('show'); p.previousElementSibling?.classList.remove('open'); });
});

(function() {
  maybeShowBanner();
  const params = new URLSearchParams(window.location.search);
  const wallet = params.get('wallet'), name = params.get('name');
  if (wallet) {
    document.getElementById('walletTitle').textContent = name || shortAddr(wallet);
    document.getElementById('walletSubtitle').textContent = name ? shortAddr(wallet) : 'Portfolio';
    document.getElementById('inputSection')?.remove();
    loadWallet(wallet);
  } else {
    document.getElementById('walletTitle').textContent = 'Ching Ching';
    document.getElementById('walletSubtitle').textContent = 'Portfolio';
  }
})();
</script>
